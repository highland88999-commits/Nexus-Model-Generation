name: Deploy Modal Backend

on:
  push:
    branches:
      - main
    paths:
      - 'olympus-3d-generator/backend/**'
      - 'olympus-3d-generator/package.json'
      - '.github/workflows/deploy-modal.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: olympus-3d-generator

    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      MODAL_TOKEN_ID_ENV: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET_ENV: ${{ secrets.MODAL_TOKEN_SECRET }}
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          # Auto-generate lockfile if missing
          if [ ! -f package-lock.json ]; then
            echo "package-lock.json not found. Generating..."
            npm install
          else
            npm ci
          fi
          npm run backend:init

      - name: Authenticate Modal CLI
        run: |
          modal token set --token-id "$MODAL_TOKEN_ID_ENV" --token-secret "$MODAL_TOKEN_SECRET_ENV"

      - name: Build Secure .env File
        run: |
          cat > .env << EOF
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EOF

      - name: Bootstrap Modal Pipeline
        run: npm run backend:bootstrap
