name: Deploy Modal Backend

on:
  push:
    branches:
      - main # Runs automatically when you save to the main branch
    paths:
      - 'olympus-3d-generator/backend/**' 
      - 'olympus-3d-generator/package.json'
      - '.github/workflows/deploy-modal.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    # This forces GitHub to execute all terminal commands inside your subfolder
    defaults:
      run:
        working-directory: olympus-3d-generator

    # Injects your Modal tokens into the GitHub server
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Node Dependencies
        run: npm install

      - name: Build Secure .env File
        # Generates the .env file exactly where the bootstrap script expects it
        run: |
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" > .env

      - name: Bootstrap Modal Pipeline (Init, Secrets, & Deploy)
        run: npm run backend:bootstrap
